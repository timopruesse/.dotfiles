bind r source $HOME/.tmux.conf \; display "tmux config reloaded"

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# terminal
set-option -g  default-terminal 'tmux-256color'
set-option -ga terminal-overrides ',xterm-256color:Tc'

# scrollback
set -g history-limit 200000

# indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# status / display
set-option -g status-position top
set -g display-time 2000

# input
setw -g mode-keys vi
set -g mouse on

# clipboard (OSC 52 to host clipboard)
set -s set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# nvim-friendly
set-option -sg escape-time 10
set-option -g focus-events on

# refresh inherited env on reattach
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY WAYLAND_DISPLAY XAUTHORITY"

# open new windows / splits with the current directory
bind c new-window      -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# restore default last-window on Tab
bind Tab last-window

# popup terminal on backtick
bind ` popup -w 75% -h 80% -d '#{pane_current_path}'

# window swap
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# navigate splits with alt + arrows
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# claude bindings
bind S new-window -c '#{pane_current_path}' 'claude --resume'
bind R new-window -c '#{pane_current_path}' 'claude --continue'
bind H split-window -h -c '#{pane_current_path}' 'claude'
bind V split-window -v -c '#{pane_current_path}' 'claude'
bind C display-popup -w 70% -h 50% -E '~/.tmux/scripts/claude_picker.sh'

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# plugin settings
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-hook-post-save-layout '~/.tmux/scripts/resurrect_rewrite_paths.sh'

# theme
set -g @catppuccin_flavor 'mocha'

# tpm (keep at the bottom)
run '~/.tmux/plugins/tpm/tpm'

# status-right additions (after tpm so catppuccin palette is loaded)
set -g status-right-length 200
set -g status-right ""
set -agF status-right " #[fg=#{@thm_mauve}]#(~/.tmux/scripts/claude_count.sh)"
set -agF status-right " #[fg=#{@thm_yellow}]#(~/.tmux/scripts/aws_profile.sh)"
