bind r source $HOME/.tmux.conf \; display "tmux config reloaded"

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# terminal
set-option -g  default-terminal 'tmux-256color'
set-option -ga terminal-overrides ',xterm-256color:Tc'

# scrollback
set -g history-limit 200000

# indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# status / display
set-option -g status-position top
set -g display-time 2000

# input
setw -g mode-keys vi
set -g mouse on

# clipboard (OSC 52 to host clipboard)
set -s set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# nvim-friendly
set-option -sg escape-time 10
set-option -g focus-events on

# refresh inherited env on reattach
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY WAYLAND_DISPLAY XAUTHORITY"

# open new windows / splits with the current directory
bind c new-window      -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# restore default last-window on Tab
bind Tab last-window

# popup terminal on backtick
bind ` popup -w 75% -h 80% -d '#{pane_current_path}'

# window swap
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# seamless nvim <-> tmux pane navigation with alt + h/j/k/l
# (vim-tmux-navigator): if the active pane runs (n)vim, forward the key so nvim
# moves between its splits; otherwise switch tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R

# coding-agent bindings (claude in chewielabs work repos, agent elsewhere —
# see ~/.tmux/scripts/coding_agent_resolve.sh)
bind S new-window -c '#{pane_current_path}' '~/.tmux/scripts/coding_agent_launch.sh resume'
bind R new-window -c '#{pane_current_path}' '~/.tmux/scripts/coding_agent_launch.sh continue'
bind H split-window -h -c '#{pane_current_path}' '~/.tmux/scripts/coding_agent_launch.sh'
bind V split-window -v -c '#{pane_current_path}' '~/.tmux/scripts/coding_agent_launch.sh'
bind C display-popup -w 70% -h 50% -E '~/.tmux/scripts/claude_picker.sh'
# toggle a live sessions sidebar (split right); enter jumps, esc/re-press closes
bind a run-shell '~/.tmux/scripts/claude_panel_toggle.sh'

# harpoon-style session pinning: pin current pane, jump to a slot instantly
bind m run-shell '~/.tmux/scripts/harpoon_add.sh'
bind e display-popup -w 60% -h 50% -E '~/.tmux/scripts/harpoon_menu.sh'
bind-key -n M-1 run-shell '~/.tmux/scripts/harpoon_jump.sh 1'
bind-key -n M-2 run-shell '~/.tmux/scripts/harpoon_jump.sh 2'
bind-key -n M-3 run-shell '~/.tmux/scripts/harpoon_jump.sh 3'
bind-key -n M-4 run-shell '~/.tmux/scripts/harpoon_jump.sh 4'

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# plugin settings
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-hook-post-save-layout '~/.tmux/scripts/resurrect_rewrite_paths.sh'

# theme
set -g @catppuccin_flavor 'mocha'

# tpm (keep at the bottom)
run '~/.tmux/plugins/tpm/tpm'

# status-right additions (after tpm so catppuccin palette is loaded)
set -g status-right-length 200
set -g status-right ""
set -agF status-right " #[fg=#{@thm_mauve}]#(~/.tmux/scripts/claude_count.sh)"
set -agF status-right " #[fg=#{@thm_yellow}]#(~/.tmux/scripts/aws_profile.sh)"

# window names: coding-agent windows show their (truncated) task summary instead
# of the command/version; other windows keep the default command name.
set -g automatic-rename on
set -g automatic-rename-format '#{?#{m/r:^claude$|^agent$|^cursor-agent$|^[0-9]+\.[0-9]+,#{pane_current_command}},#{=/24/…:#{s/^[^ ]* //:pane_title}},#{pane_current_command}}'
