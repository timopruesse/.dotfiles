---
default_shell: "zsh"

tasks:
  homebrew_macos:
    os: ["macos"]
    commands:
      - run:
          commands:
            - '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
            - 'eval "$(/opt/homebrew/bin/brew shellenv)"'

  homebrew_linux:
    os: ["linux"]
    commands:
      - run:
          env:
            TMP_INSTALL_PATH: "/tmp/install-brew.sh"
          commands:
            - "wget -O $TMP_INSTALL_PATH https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh"
            - "chmod u+x $TMP_INSTALL_PATH"
            - "$TMP_INSTALL_PATH"
            - "rm $TMP_INSTALL_PATH"
            - 'rm -rf "/home/linuxbrew/.linuxbrew/Homebrew/Library/Taps/homebrew/homebrew-core"'
            - "brew tap homebrew/core"
            - 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"'

  zsh_linux:
    os: ["linux"]
    commands:
      - run:
          shell: "bash"
          commands:
            - "sudo apt-get update"
            - "sudo apt-get install -y zsh"
            - 'sudo chsh -s "$(command -v zsh)" "${USER}"'
      - clone:
          url: "https://github.com/agkozak/zcomet.git"
          target: "~/.zcomet/bin"

  zsh_macos:
    os: ["macos"]
    commands:
      - run:
          commands:
            - "brew install zsh"
            - 'sudo chsh -s "$(command -v zsh)" "${USER}"'
      - clone:
          url: "https://github.com/agkozak/zcomet.git"
          target: "~/.zcomet/bin"

  wsl_config:
    os: ["linux"]
    commands:
      - copy:
          src: "./etc/wsl.conf"
          target: "/etc/wsl.conf"
          sudo: true

  win32yank_wsl:
    os: ["linux"]
    commands:
      - run:
          env:
            TMP_ZIP: "/tmp/win32yank.zip"
          install:
            - "mkdir -p $HOME/.local/bin"
            - "curl -fsSL -o $TMP_ZIP https://github.com/equalsraf/win32yank/releases/download/v0.1.1/win32yank-x64.zip"
            - "unzip -p $TMP_ZIP win32yank.exe > $HOME/.local/bin/win32yank.exe"
            - "chmod +x $HOME/.local/bin/win32yank.exe"
            - "rm -f $TMP_ZIP"
          uninstall:
            - "rm -f $HOME/.local/bin/win32yank.exe"

  windows_terminal:
    os: ["linux"]
    commands:
      - run:
          shell: "bash"
          env:
            SETTINGS_PATH: "/mnt/c/Users/Timo/AppData/Local/Packages/Microsoft.WindowsTerminalPreview_8wekyb3d8bbwe/LocalState/settings.json"
          commands:
            - "rm -f $SETTINGS_PATH"
      # symlink doesn't work after the settings were changed via UI
      # Apparently, the file gets regenerated instead of changed
      - copy:
          src: "./terminal"
          target: "/mnt/c/Users/Timo/AppData/Local/Packages/Microsoft.WindowsTerminalPreview_8wekyb3d8bbwe/LocalState"

  ssh:
    os: ["linux"]
    commands:
      - copy:
          src: "/mnt/c/Users/Timo/OneDrive/Dokumente/_DEV/.ssh"
          target: "~/.ssh"
      - run:
          install:
            - "chmod 700 ~/.ssh"
            - "chmod 600 ~/.ssh/id_rsa"
            - "chmod 644 ~/.ssh/id_rsa.pub"

  tools_linux:
    os: ["linux"]
    commands:
      - run:
          commands:
            - "sudo add-apt-repository -y ppa:git-core/ppa"
            - "sudo apt-get update && sudo apt-get upgrade -y"
            - "sudo apt-get install -y git tmux fuse ripgrep fzf fd-find unzip apt-transport-https lsb-release ca-certificates wget software-properties-common keychain xclip libssl-dev cmake pkg-config build-essential eza fswatch luarocks libclang-dev wslu xdg-utils"
            - "curl -sS https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | bash"
            - "sudo locale-gen en_US.UTF-8"

  tools_macos:
    os: ["macos"]
    commands:
      - run:
          commands:
            - "brew install git tmux ripgrep fzf fd wget keychain cmake pkg-config eza fswatch luarocks zoxide"

  gh_linux:
    os: ["linux"]
    commands:
      - run:
          install:
            - "sudo mkdir -p -m 755 /etc/apt/keyrings"
            - "wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null"
            - "sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg"
            - 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null'
            - "sudo apt-get update"
            - "sudo apt-get install -y gh"
          update:
            - "sudo apt-get upgrade -y gh"
          uninstall:
            - "sudo apt-get remove -y gh"

  gh_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install gh"
          update:
            - "brew upgrade gh"
          uninstall:
            - "brew uninstall gh"

  tpm:
    commands:
      - clone:
          url: "https://github.com/tmux-plugins/tpm"
          target: "$HOME/.tmux/plugins/tpm"

  dotfiles:
    commands:
      - clone:
          url: "git@github.com:timopruesse/.dotfiles.git"
          target: "."
      - symlink:
          force: true
          src: "./home"
          target: "~"

  lazygit_linux:
    os: ["linux"]
    commands:
      - run:
          install:
            - "$HOME/install_lazygit.sh"

  lazygit_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install jesseduffield/lazygit/lazygit"
            - "brew install lazygit"

  neovim_linux:
    os: ["linux"]
    commands:
      - run:
          install:
            - 'ARCH=$(uname -m); case "$ARCH" in aarch64) ARCH=arm64 ;; esac; curl -fsSL -o /tmp/nvim-nightly.tar.gz "https://github.com/neovim/neovim/releases/download/nightly/nvim-linux-${ARCH}.tar.gz"'
            - "sudo -n rm -rf /opt/nvim && sudo -n mkdir -p /opt/nvim"
            - "sudo -n tar -C /opt/nvim --strip-components=1 -xzf /tmp/nvim-nightly.tar.gz"
            - "sudo -n ln -sfn /opt/nvim/bin/nvim /usr/local/bin/nvim"
            - "rm -f /tmp/nvim-nightly.tar.gz"
            - "sudo -n luarocks install jsregexp"
          update:
            - 'ARCH=$(uname -m); case "$ARCH" in aarch64) ARCH=arm64 ;; esac; curl -fsSL -o /tmp/nvim-nightly.tar.gz "https://github.com/neovim/neovim/releases/download/nightly/nvim-linux-${ARCH}.tar.gz"'
            - "sudo -n rm -rf /opt/nvim && sudo -n mkdir -p /opt/nvim"
            - "sudo -n tar -C /opt/nvim --strip-components=1 -xzf /tmp/nvim-nightly.tar.gz"
            - "sudo -n ln -sfn /opt/nvim/bin/nvim /usr/local/bin/nvim"
            - "rm -f /tmp/nvim-nightly.tar.gz"
          uninstall:
            - "sudo -n rm -f /usr/local/bin/nvim"
            - "sudo -n rm -rf /opt/nvim"

  neovim_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install --HEAD neovim"
            - "luarocks install jsregexp"
          update:
            - "brew upgrade --fetch-HEAD neovim"
          uninstall:
            - "brew uninstall neovim"

  rust:
    commands:
      - run:
          install:
            - "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain none -y"
            - "source $HOME/.cargo/env"
            - "rustup toolchain install nightly --allow-downgrade --profile minimal --component clippy"
            - "rustup component add rustfmt --toolchain nightly"
            - "rustup component add rust-analyzer --toolchain nightly"
          update:
            - "rustup update"
      - run:
          commands:
            - "cargo install cargo-tarpaulin"
            - "cargo install tree-sitter-cli"

  bun:
    commands:
      - run:
          install: "curl -fsSL https://bun.sh/install | bash"
          update: "bun upgrade --canary"

  node_linux:
    os: ["linux"]
    commands:
      - run:
          install:
            - "cargo install fnm"
            - 'eval "$(fnm env)" && fnm install --latest && fnm default $(fnm current)'
          update:
            - "cargo install fnm"
            - 'eval "$(fnm env)" && fnm install --latest && fnm default $(fnm current) && npm upgrade -g'
          uninstall:
            - "rm -rf ~/.local/share/fnm"
            - "cargo uninstall fnm"

  node_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install fnm"
            - 'eval "$(fnm env)" && fnm install --latest && fnm default $(fnm current)'
          update:
            - "brew upgrade fnm"
            - 'eval "$(fnm env)" && fnm install --latest && fnm default $(fnm current) && npm upgrade -g'
          uninstall:
            - "brew uninstall fnm"

  nvim-npm:
    commands:
      - run:
          env:
            PACKAGES_STR: "neovim"
          install: "npm install -g $(echo $PACKAGES_STR)"
          update: "npm upgrade -g $(echo $PACKAGES_STR)"
          uninstall: "npm uninstall -g $(echo $PACKAGES_STR)"

  python_linux:
    os: ["linux"]
    commands:
      - run:
          install:
            - "sudo apt-get install -y pipx python3-venv python3-pip python3-pynvim"
            - "python3 -m pipx ensurepath"
            - "pipx install pip-review"
          update:
            - "pip-review --auto"

  python_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install python pipx"
            - "python3 -m pipx ensurepath"
            - "pipx install pip-review"
            - "pipx install pynvim"
          update:
            - "pip-review --auto"

  go_linux:
    os: ["linux"]
    commands:
      - run:
          install:
            - "sudo apt-get install -y golang"
          update:
            - "sudo apt-get upgrade -y golang"
          uninstall:
            - "sudo apt-get remove -y golang"

  go_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install go"
          update:
            - "brew upgrade go"
          uninstall:
            - "brew uninstall go"

  docker:
    os: ["linux"]
    commands:
      - run:
          install:
            - "sudo install -m 0755 -d /etc/apt/keyrings"
            - "sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc"
            - "sudo chmod a+r /etc/apt/keyrings/docker.asc"
            - 'echo "Types: deb\nURIs: https://download.docker.com/linux/ubuntu\nSuites: $(. /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME})\nComponents: stable\nArchitectures: $(dpkg --print-architecture)\nSigned-By: /etc/apt/keyrings/docker.asc" | sudo tee /etc/apt/sources.list.d/docker.sources > /dev/null'
            - "sudo apt-get update"
            - "sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin"
            - "sudo usermod -aG docker $USER"
          update:
            - "sudo apt-get update"
            - "sudo apt-get upgrade -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin"
          uninstall:
            - "sudo apt-get remove -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin"
            - "sudo rm -f /etc/apt/sources.list.d/docker.sources"
            - "sudo rm -f /etc/apt/keyrings/docker.asc"

  colima_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install colima docker docker-compose docker-buildx"
          update:
            - "brew upgrade colima docker docker-compose docker-buildx"
          uninstall:
            - "brew uninstall colima docker docker-compose docker-buildx"

  aws_cli_linux:
    os: ["linux"]
    commands:
      - run:
          env:
            TMP_DIR: "/tmp/awscli-install"
          install:
            - "mkdir -p $TMP_DIR"
            - 'curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$TMP_DIR/awscliv2.zip"'
            - "unzip -o $TMP_DIR/awscliv2.zip -d $TMP_DIR"
            - "sudo $TMP_DIR/aws/install"
            - "rm -rf $TMP_DIR"
          update:
            - "mkdir -p $TMP_DIR"
            - 'curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$TMP_DIR/awscliv2.zip"'
            - "unzip -o $TMP_DIR/awscliv2.zip -d $TMP_DIR"
            - "sudo $TMP_DIR/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update"
            - "rm -rf $TMP_DIR"
          uninstall:
            - "sudo rm -f /usr/local/bin/aws"
            - "sudo rm -f /usr/local/bin/aws_completer"
            - "sudo rm -rf /usr/local/aws-cli"

  aws_cli_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install awscli"
          update:
            - "brew upgrade awscli"
          uninstall:
            - "brew uninstall awscli"

  ghostty_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install --cask ghostty"
          update:
            - "brew upgrade --cask ghostty"
          uninstall:
            - "brew uninstall --cask ghostty"

  font_macos:
    os: ["macos"]
    commands:
      - run:
          install:
            - "brew install --cask font-meslo-lg-nerd-font"
          update:
            - "brew upgrade --cask font-meslo-lg-nerd-font"

  font_linux:
    os: ["linux"]
    commands:
      - run:
          env:
            FONT_DIR: "$HOME/.local/share/fonts/MesloLGS"
            TMP_ZIP: "/tmp/meslo-nf.zip"
          install:
            - "mkdir -p $FONT_DIR"
            - "curl -fL https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Meslo.zip -o $TMP_ZIP"
            - "unzip -o $TMP_ZIP -d $FONT_DIR"
            - "rm $TMP_ZIP"
            - "fc-cache -fv"

  personal_repos:
    commands:
      - machine_setup:
          config: "$DOTFILES/personal_repositories.yaml"
